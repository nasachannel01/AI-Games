<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hokm Dasi - Pro v15</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Using the most stable CDN for GitHub Pages -->
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --gold: #ffd670;
            --dark: #03080f;
            --card-w: min(70px, 14vw);
            --card-h: calc(var(--card-w) * 1.5);
            --overlap: calc(var(--card-w) * -0.45);
        }

        html, body { margin: 0; padding: 0; height: 100%; background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100dvh; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .screen.active { display: flex; }

        /* Setup Overlays */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-card { background: #0e1e30; border: 2px solid var(--gold); padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: #000; color: #fff; font-size: 16px; box-sizing: border-box; }
        .menu-btn { background: #102136; border: 2px solid var(--gold); color: var(--gold); padding: 14px; border-radius: 30px; cursor: pointer; font-weight: 700; text-transform: uppercase; transition: 0.2s; min-height: 50px; }
        .menu-btn:disabled { opacity: 0.5; }

        /* Game Board */
        #game-container { width: 100%; height: 100%; display: flex; flex-direction: column; background: radial-gradient(circle, #0e2238 0%, #03080d 100%); }
        #header-hud { display: flex; justify-content: space-between; padding: 10px 12px; background: rgba(0,0,0,0.9); font-size: 10px; border-bottom: 2px solid #222; cursor: pointer; }
        .hud-score { background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; border: 1px solid #444; }
        #play-field { flex: 1; position: relative; }
        #table-center { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 240px; border-radius: 50%; border: 1px solid rgba(255,214,112,0.1); }
        
        .player-badge { position: absolute; background: rgba(0,0,0,0.95); padding: 6px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #444; z-index: 30; white-space: nowrap; transform: translate(-50%, -50%); }
        .active-turn { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); scale: 1.1; }
        .dealer-mark { color: var(--gold); font-weight: bold; border: 1px solid var(--gold); border-radius: 50%; padding: 0 4px; margin-left: 4px; font-size: 9px; }

        /* Card Visuals - Forced High Vis */
        .card { 
            width: var(--card-w); height: var(--card-h); 
            background: #FFFFFF !important; color: #000000 !important; 
            border-radius: 8px; border: 1px solid #000;
            display: flex; flex-direction: column; justify-content: space-between; 
            padding: 5px; box-sizing: border-box; font-weight: 900; font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }
        .red-suit { color: #d00 !important; }
        .card-center { font-size: 2.4em; align-self: center; line-height: 1; pointer-events: none; }
        
        /* Only dim cards if it is strictly NOT your turn */
        .not-my-turn { filter: grayscale(1) brightness(0.4) !important; opacity: 0.4 !important; pointer-events: none !important; }

        #player-hand { display: flex; justify-content: center; padding: 25px 10px; padding-left: 50px; min-height: var(--card-h); background: rgba(0,0,0,0.85); z-index: 100; border-top: 1px solid #333; }
        #player-hand .card { margin-left: var(--overlap); transition: transform 0.2s; cursor: pointer; }
        #player-hand .card:hover { transform: translateY(-25px); z-index: 200; }

        .played-card-slot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        #status-bar { text-align: center; font-size: 16px; padding: 15px; color: var(--gold); background: #000; font-weight: 700; border-top: 2px solid #333; }

        #result-modal { display: none; position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .result-box { text-align: center; background: #102136; padding: 35px; border-radius: 25px; border: 3px solid var(--gold); min-width: 280px; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <h1 style="font-family:'Cinzel'; color:var(--gold); font-size: 45px;">HOKM DASI</h1>
        <div style="width:230px; display:flex; flex-direction:column; gap:12px">
            <button class="menu-btn" onclick="startSinglePlayer()">Single Player</button>
            <button class="menu-btn" onclick="openModal('host')">Host Match</button>
            <button class="menu-btn" onclick="openModal('join')">Join Game</button>
        </div>
    </div>

    <div id="multi-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 id="modal-title" style="margin:0; color:var(--gold); text-align:center;">Setup</h3>
            <input type="text" id="p-name" placeholder="Your Name" maxlength="12">
            <div id="host-opt">
                <select id="p-count">
                    <option value="4">4 Players</option>
                    <option value="6" selected>6 Players</option>
                </select>
            </div>
            <input type="text" id="j-key" placeholder="Enter 5-Digit Key" style="display:none; text-transform:uppercase;">
            <button id="lobby-submit" class="menu-btn" onclick="submitMulti()">Enter Lobby</button>
            <button class="menu-btn" style="background:transparent; border:none" onclick="closeModal()">Back</button>
        </div>
    </div>

    <div id="result-modal">
        <div class="result-box">
            <div id="result-text" style="font-family:Cinzel; font-size:28px; color:var(--gold)">ROUND OVER</div>
            <div id="result-details" style="margin:20px 0; opacity:0.8">Scoring...</div>
            <button class="menu-btn" style="width:100%" onclick="closeResultModal()">Start Next Round</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 style="margin:0">Room Key</h2>
        <div id="key-view" style="font-size:45px; color:var(--gold); letter-spacing:12px; margin:15px 0">-----</div>
        <div id="lobby-list" style="margin:20px 0; background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; width:280px; min-height: 120px;"></div>
        <button id="start-btn" class="menu-btn" style="display:none; width: 220px" onclick="startGame()">Start Match</button>
        <p id="wait-txt" style="color:var(--gold); text-align:center; padding:0 20px;">Establishing Secure Network...</p>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-container">
            <div id="header-hud" onclick="renderHand()">
                <div>TRUMP: <span id="hud-trump" style="color:var(--gold); font-weight:800;">NONE</span></div>
                <div class="hud-score">US: <span id="hud-us-tens">0</span>T/<span id="hud-us-tricks">0</span> (G:<span id="hud-us-match">0</span>)</div>
                <div class="hud-score">THEM: <span id="hud-them-tens">0</span>T/<span id="hud-them-tricks">0</span> (G:<span id="hud-them-match">0</span>)</div>
            </div>
            <div id="play-field">
                <div id="table-center"><div id="cards-layer"></div></div>
            </div>
            <div id="status-bar">Syncing...</div>
            <div id="player-hand"></div>
        </div>
    </div>

<script>
    const suits = ['♠', '♥', '♦', '♣'];
    const vals = [{n:'2',v:2},{n:'3',v:3},{n:'4',v:4},{n:'5',v:5},{n:'6',v:6},{n:'7',v:7},{n:'8',v:8},{n:'9',v:9},{n:'10',v:10},{n:'J',v:11},{n:'Q',v:12},{n:'K',v:13},{n:'A',v:14}];
    
    let isHost = false, peer = null, hostConn = null, players = [], gameMode = 6;
    let myIdx = 0, myHand = [], distributorIdx = 0, currentPlayer = 0;
    let trump = null, leadSuit = null, trick = [], tens = [0,0], tricks = [0,0], match = [0,0];
    let allHands = [];

    function openModal(t) {
        isHost = (t==='host');
        document.getElementById('modal-title').innerText = isHost ? "Host Match" : "Join Match";
        document.getElementById('host-opt').style.display = isHost ? "block" : "none";
        document.getElementById('j-key').style.display = isHost ? "none" : "block";
        document.getElementById('multi-modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('multi-modal').style.display = 'none'; }

    function submitMulti() {
        const nameInput = document.getElementById('p-name').value.trim() || "Player";
        gameMode = parseInt(document.getElementById('p-count').value);
        const key = document.getElementById('j-key').value.trim().toUpperCase();
        
        document.getElementById('lobby-submit').disabled = true;
        document.getElementById('lobby-submit').innerText = "Connecting...";

        // GITHUB HTTPS OPTIMIZED CONFIG
        const peerConfig = {
            secure: true,
            port: 443,
            host: '0.peerjs.com',
            debug: 1
        };

        const customId = isHost ? "DASI-" + Math.random().toString(36).substring(2, 7).toUpperCase() : null;
        if (peer) peer.destroy();
        peer = new Peer(customId, peerConfig);

        peer.on('open', (id) => {
            closeModal();
            showScreen('lobby-screen');
            if(isHost) {
                document.getElementById('key-view').innerText = id.split('-')[1];
                players = [{name: nameInput, id: id, conn: null, isAI: false}];
                updateLobby();
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('wait-txt').innerText = "Wait for players to join";
            } else {
                document.getElementById('key-view').innerText = key;
                document.getElementById('wait-txt').innerText = "Connecting to Host...";
                hostConn = peer.connect("DASI-" + key);
                setupClient(hostConn, nameInput);
            }
        });

        peer.on('error', (err) => {
            alert("Network Error: " + err.type + ". Ensure no ad-blockers are active.");
            document.getElementById('lobby-submit').disabled = false;
            document.getElementById('lobby-submit').innerText = "Enter Lobby";
        });

        peer.on('connection', c => {
            c.on('data', d => {
                if(d.type==='JOIN' && isHost) {
                    players.push({name: d.name, id: c.peer, conn: c, isAI: false});
                    updateLobby();
                    broadcast({type:'LOBBY', players: players.map(p => ({name: p.name}))});
                } else if(d.type==='PLAY' && isHost) {
                    handlePlayLogic(parseInt(d.pIdx), d.card);
                }
            });
        });
    }

    function setupClient(c, myName) {
        c.on('open', () => {
            document.getElementById('wait-txt').innerText = "Handshaking...";
            c.send({type:'JOIN', name: myName});
        });
        c.on('data', d => {
            if(d.type==='LOBBY') { players = d.players; updateLobby(); }
            else if(d.type==='START') { gameMode = d.mode; players = d.players; myIdx = parseInt(d.myIdx); showScreen('game-screen'); initBoard(); }
            else if(d.type==='DEAL') { 
                document.getElementById('cards-layer').innerHTML = '';
                trick = []; leadSuit = null; trump = null;
                myHand = d.hand; distributorIdx = parseInt(d.dist); 
                currentPlayer = parseInt(d.turn); renderHand(); updateHUD(d.st); updateBadges(); highlight();
            }
            else if(d.type==='SYNC') { 
                const oldTrump = trump;
                trick = d.trick; leadSuit = d.lead; trump = d.trump; currentPlayer = parseInt(d.turn); 
                if (trump !== oldTrump) { sortHand(myHand); }
                renderTable(); updateHUD(d.st); highlight(); renderHand(); 
            }
            else if(d.type==='MSG') { document.getElementById('status-bar').innerText = d.txt; }
            else if(d.type==='ROUND_END') { showResultModal(d.title, d.details); }
        });
    }

    function broadcast(d) { players.forEach(p => p.conn && p.conn.send(d)); }

    function startSinglePlayer() {
        isHost = true; gameMode = 6; players = [{name: "Host", id: 'host', isAI:false}]; startGame();
    }

    function startGame() {
        while(players.length < gameMode) players.push({name:"AI "+players.length, id:'ai'+players.length, isAI:true});
        distributorIdx = Math.floor(Math.random()*gameMode);
        players.forEach((p,i) => { if(p.conn) p.conn.send({type:'START', mode:gameMode, myIdx:i, players:players.map(x=>({name: x.name}))}); });
        myIdx = 0; showScreen('game-screen'); initBoard(); startRound();
    }

    function startRound() {
        document.getElementById('cards-layer').innerHTML = '';
        tens = [0,0]; tricks = [0,0]; trump = null; leadSuit = null; trick = [];
        currentPlayer = (distributorIdx + 1) % gameMode;
        let deck = []; vals.forEach(v => suits.forEach(s => { if(!(gameMode===6 && v.v===2)) deck.push({s,n:v.n,v:v.v}); }));
        deck.sort(()=>Math.random()-0.5);
        allHands = Array.from({length:gameMode}, ()=>[]);
        let j = 0; while(deck.length) allHands[j++ % gameMode].push(deck.pop());
        players.forEach((p, idx) => {
            sortHand(allHands[idx]); 
            if(p.conn) p.conn.send({type:'DEAL', hand:allHands[idx], dist:distributorIdx, turn:currentPlayer, st:getStats()});
        });
        myHand = allHands[0];
        renderHand(); updateHUD(getStats()); updateBadges(); highlight();
        if(players[currentPlayer].isAI) setTimeout(playAI, 1200);
    }

    function sortHand(h) {
        h.sort((a, b) => {
            if (trump) {
                if (a.s === trump && b.s !== trump) return -1;
                if (a.s !== trump && b.s === trump) return 1;
            }
            if (a.s !== b.s) return suits.indexOf(a.s) - suits.indexOf(b.s);
            return a.v - b.v;
        });
    }

    function handlePlayLogic(pIdx, card) {
        if(!isHost) return;
        const h = allHands[pIdx];
        const cIdx = h.findIndex(c => c.s === card.s && c.v === card.v);
        if(cIdx > -1) h.splice(cIdx,1);
        if(pIdx === 0) myHand = allHands[0]; 

        if(trick.length === 0) leadSuit = card.s;
        if(trump === null && card.s !== leadSuit && trick.length > 0) {
            trump = card.s;
            allHands.forEach(hand => sortHand(hand));
            myHand = allHands[0];
            broadcast({type:'MSG', txt: `HOKM SET: ${trump}`});
        }
        
        trick.push({pIdx, card});
        currentPlayer = (pIdx + 1) % gameMode;
        if(trick.length === gameMode) { sync(); setTimeout(evalTrick, 1200); }
        else { sync(); if(players[currentPlayer].isAI) setTimeout(playAI, 1000); }
    }

    function evalTrick() {
        let win = trick[0];
        trick.forEach(p => {
            let c = p.card, w = win.card;
            if(trump && c.s===trump && w.s!==trump) win=p;
            else if(trump && c.s===trump && w.s===trump && c.v>w.v) win=p;
            else if(c.s===leadSuit && w.s!==trump && (w.s!==leadSuit || c.v>w.v)) win=p;
        });
        let team = win.pIdx % 2;
        trick.forEach(p => { if(p.card.v === 10) tens[team]++; });
        tricks[team]++;
        currentPlayer = win.pIdx; trick = []; leadSuit = null;
        
        const winThreshold = (gameMode === 6) ? 5 : 7;
        const drawThreshold = (gameMode === 6) ? 4 : -1;
        let end = false, title = "", details = "";

        if(tens[0] >= 3) { end = true; title = "US WINS!"; details = "3 Tens collected."; match[0]++; }
        else if(tens[1] >= 3) { end = true; title = "THEM WINS!"; details = "3 Tens collected."; match[1]++; }
        else if(tens[0] === 2 && tricks[0] >= winThreshold) { end = true; title = "US WINS!"; details = `2 Tens and ${tricks[0]} Tricks.`; match[0]++; }
        else if(tens[1] === 2 && tricks[1] >= winThreshold) { end = true; title = "THEM WINS!"; details = `2 Tens and ${tricks[1]} Tricks.`; match[1]++; }
        else if(tens[0] === 2 && tens[1] === 2 && tricks[0] === drawThreshold && tricks[1] === drawThreshold && allHands[0].length === 0) { 
            end = true; title = "ROUND DRAW!"; details = "4 Tricks and 2 Tens each."; 
        }

        if(end) {
            const dTeam = distributorIdx % 2;
            const wTeam = title.includes("US") ? 0 : (title.includes("THEM") ? 1 : -1);
            if(wTeam === dTeam) distributorIdx = (distributorIdx + 1) % gameMode;
            showResultModal(title, details);
            broadcast({type:'ROUND_END', title, details});
        } else {
            sync();
            if(players[currentPlayer].isAI) setTimeout(playAI, 1000);
        }
    }

    function showResultModal(title, details) {
        document.getElementById('result-text').innerText = title;
        document.getElementById('result-details').innerText = details;
        document.getElementById('result-modal').style.display = 'flex';
    }
    function closeResultModal() {
        document.getElementById('result-modal').style.display = 'none';
        if(isHost) startRound();
    }
    function sync() {
        if(!isHost) return;
        broadcast({type:'SYNC', trick, lead:leadSuit, trump, turn:currentPlayer, st:getStats()});
        renderTable(); updateHUD(getStats()); highlight();
        renderHand(); 
    }
    function renderHand() {
        const container = document.getElementById('player-hand'); 
        container.innerHTML = '';
        if(isHost) myHand = allHands[0]; 
        const isMyTurn = parseInt(currentPlayer) === parseInt(myIdx);
        const hasSuit = leadSuit && myHand.some(x => x.s === leadSuit);
        myHand.forEach((c, i) => {
            const el = document.createElement('div');
            const follows = !leadSuit || !hasSuit || (c.s === leadSuit);
            el.className = `card ${isRed(c.s)?'red-suit':''} ${!isMyTurn?'not-my-turn':''}`;
            el.innerHTML = `<div>${c.n}${c.s}</div><div class="card-center">${c.s}</div>`;
            el.onclick = () => {
                if(!isMyTurn) return;
                if(leadSuit && hasSuit && c.s !== leadSuit) {
                    document.getElementById('status-bar').innerText = "Must follow lead suit!";
                    return;
                }
                const card = myHand.splice(i,1)[0];
                if(isHost) handlePlayLogic(0, card);
                else hostConn.send({type:'PLAY', pIdx:myIdx, card});
                renderHand();
            };
            container.appendChild(el);
        });
    }
    function renderTable() {
        const l = document.getElementById('cards-layer'); l.innerHTML = '';
        trick.forEach(p => {
            const rel = (parseInt(p.pIdx) - myIdx + gameMode) % gameMode;
            const el = document.createElement('div'); el.className = 'played-card-slot';
            const ang = (rel * (360/gameMode) + 90) * (Math.PI/180);
            const dist = 85; 
            el.style.left = `calc(50% + ${Math.cos(ang)*dist}px)`;
            el.style.top = `calc(50% + ${Math.sin(ang)*dist}px)`;
            el.innerHTML = `<div class="card ${isRed(p.card.s)?'red-suit':''}"><div>${p.card.n}${p.card.s}</div><div class="card-center">${p.card.s}</div></div>`;
            l.appendChild(el);
        });
    }
    function initBoard() {
        const f = document.getElementById('play-field');
        document.querySelectorAll('.player-badge').forEach(b => b.remove());
        players.forEach((p,i) => {
            const rel = (i - myIdx + gameMode) % gameMode;
            const badge = document.createElement('div');
            badge.className = 'player-badge'; badge.id = 'badge-'+rel;
            const ang = (rel * (360/gameMode) + 90) * (Math.PI/180);
            const dist = 140; 
            badge.style.left = `calc(50% + ${Math.cos(ang)*dist}px)`;
            badge.style.top = `calc(50% + ${Math.sin(ang)*dist}px)`;
            f.appendChild(badge);
        });
    }
    function updateBadges() {
        players.forEach((p,i) => {
            const rel = (i - myIdx + gameMode) % gameMode;
            const b = document.getElementById('badge-'+rel);
            if(b) b.innerHTML = (p.name || "Player") + (i===distributorIdx ? '<span class="dealer-mark">D</span>' : '');
        });
    }
    function highlight() {
        document.querySelectorAll('.player-badge').forEach(b => b.classList.remove('active-turn'));
        const turnRel = (parseInt(currentPlayer) - myIdx + gameMode) % gameMode;
        const b = document.getElementById('badge-'+turnRel);
        if(b) b.classList.add('active-turn');
        const turnName = players[currentPlayer]?.name || "Player";
        document.getElementById('status-bar').innerText = (parseInt(currentPlayer) === parseInt(myIdx)) ? "YOUR TURN" : `${turnName}'s turn`;
    }
    function updateHUD(s) {
        document.getElementById('hud-trump').innerText = trump || "NONE";
        document.getElementById('hud-us-tens').innerText = s.tens[0];
        document.getElementById('hud-us-tricks').innerText = s.tricks[0];
        document.getElementById('hud-us-match').innerText = match[0];
        document.getElementById('hud-them-tens').innerText = s.tens[1];
        document.getElementById('hud-them-tricks').innerText = s.tricks[1];
        document.getElementById('hud-them-match').innerText = match[1];
    }
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function updateLobby() {
        document.getElementById('lobby-list').innerHTML = players.map(p => `<div style="padding:10px; border-bottom:1px solid #333">👤 ${p.name || "..."}</div>`).join('');
    }
    function getStats() { return {tens, tricks}; }
    function isRed(s) { return s==='♥'||s==='♦'; }
    function playAI() {
        if(!isHost) return;
        const hand = allHands[currentPlayer];
        const playable = hand.filter(c => !leadSuit || !hand.some(x=>x.s===leadSuit) || c.s===leadSuit);
        const card = playable[Math.floor(Math.random()*playable.length)];
        handlePlayLogic(currentPlayer, card);
    }
</script>
</body>
</html>
